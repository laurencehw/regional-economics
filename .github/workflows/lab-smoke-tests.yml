name: Lab Smoke Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy pandas scipy

      - name: Run smoke tests
        run: |
          pytest -q tests/test_lab1_pipeline_smoke.py tests/test_lab1_lpi_proxy_smoke.py tests/test_lab1_interaction_specs_smoke.py tests/test_lab2_pipeline_smoke.py tests/test_lab4_pipeline_smoke.py tests/test_lab5_pipeline_smoke.py tests/test_lab6_pipeline_smoke.py
